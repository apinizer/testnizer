            method: GET
            body:
              mimeType: application/xml
              text: "{{xmlBody}}"
            headers:
              - name: Content-Type
                value: application/xml
            scripts:
              preRequest: >-
                const testCase = insomnia.iterationData.get('xml_case');


                if (!testCase || testCase === 'SKIP') {
                    console.log('[SKIP] xml-schema — bu iterasyonda veri yok');
                    insomnia.execution.skipRequest();
                    return;
                }


                let xmlBody;


                if (testCase === 'valid') {
                    xmlBody = `<?xml version="1.0" encoding="UTF-8"?><UserLogin><username>eren1234</username><password>12345678</password></UserLogin>`;
                }


                if (testCase === 'invalid_short_username') {
                    xmlBody = `<?xml version="1.0" encoding="UTF-8"?><UserLogin><username>abc</username><password>12345678</password></UserLogin>`;
                }


                if (testCase === 'invalid_short_password') {
                    xmlBody = `<?xml version="1.0" encoding="UTF-8"?><UserLogin><username>eren1234</username><password>123</password></UserLogin>`;
                }


                if (testCase === 'invalid_long_username') {
                    xmlBody = `<?xml version="1.0" encoding="UTF-8"?><UserLogin><username>thisusernameiswaytoolongforschema</username><password>12345678</password></UserLogin>`;
                }


                insomnia.environment.set('xmlBody', xmlBody);


                console.log('Test Case:', testCase);

                console.log('XML Body:', xmlBody);
              afterResponse: >-
                const testCase = insomnia.iterationData.get('xml_case');


                if (!testCase || testCase === 'SKIP') { return; }


                console.log('Running test for:', testCase);


                if (testCase === 'valid') {
                    insomnia.test('Valid XML schema returns 200', function () {
                        insomnia.response.to.have.status(200);
                    });
                }


                if (testCase === 'invalid_short_username') {
                    insomnia.test('Username shorter than 4 chars returns 403', function () {
                        insomnia.response.to.have.status(403);
                    });

                    const res = insomnia.response.json();

                    insomnia.test('Response contains fault object', function () {
                        insomnia.expect(res).to.have.property('fault');
                    });

                    insomnia.test('Fault status code is 403', function () {
                        insomnia.expect(res.fault.faultStatusCode).to.eql('403');
                    });

                    insomnia.test('Fault message indicates schema validation failure', function () {
                        insomnia.expect(res.fault.faultString).to.match(/schema|validation|username|minLength/i);
                    });
                }


                if (testCase === 'invalid_short_password') {
                    insomnia.test('Password shorter than 8 chars returns 403', function () {
                        insomnia.response.to.have.status(403);
                    });

                    const res = insomnia.response.json();

                    insomnia.test('Fault status code is 403', function () {
                        insomnia.expect(res.fault.faultStatusCode).to.eql('403');
                    });

                    insomnia.test('Fault message indicates schema validation failure', function () {
                        insomnia.expect(res.fault.faultString).to.match(/schema|validation|password|minLength/i);
                    });
                }


                if (testCase === 'invalid_long_username') {
                    insomnia.test('Username longer than 20 chars returns 403', function () {
                        insomnia.response.to.have.status(403);
                    });

                    const res = insomnia.response.json();

                    insomnia.test('Fault status code is 403', function () {
                        insomnia.expect(res.fault.faultStatusCode).to.eql('403');
                    });

                    insomnia.test('Fault message indicates schema validation failure', function () {
                        insomnia.expect(res.fault.faultString).to.match(/schema|validation|username|maxLength/i);
                    });
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
