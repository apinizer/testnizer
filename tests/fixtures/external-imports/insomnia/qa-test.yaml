            meta:
              id: req_3b51fc939b3f4cbb9c3393e1ca31bb91
              created: 1772438914104
              modified: 1772438914103
              isPrivate: false
              description: ""
              sortKey: -1772438912207
            method: GET
            scripts:
              preRequest: >-
                // Sabit endpoint — sadece iteration 1'de çalışır

                const runOnce = insomnia.iterationData.get('run_once');

                if (runOnce !== 'yes') {
                    console.log('[SKIP] time-restriction — sadece ilk iterasyonda çalışır');
                    insomnia.execution.skipRequest();
                }
              afterResponse: >-
                const now = new Date();

                const currentHour = now.getHours();

                const isWorkingHours = currentHour >= 9 && currentHour < 18;


                console.log('Current time:', now.toLocaleTimeString('tr-TR'));

                console.log('Current hour:', currentHour);

                console.log('Is working hours:', isWorkingHours);

                console.log('Response status:', insomnia.response.code);


                if (isWorkingHours) {
                    insomnia.test('Request during working hours (09:00-18:00) returns 403 - RESTRICTED', function () {
                        insomnia.response.to.have.status(403);
                    });

                    const res = insomnia.response.json();

                    insomnia.test('Fault code is ERR-024', function () {
                        insomnia.expect(res.fault.faultCode).to.eql('ERR-024');
                    });

                    insomnia.test('Fault status code is 403', function () {
                        insomnia.expect(res.fault.faultStatusCode).to.eql('403');
                    });

                    insomnia.test('Fault message indicates time restriction', function () {
                        insomnia.expect(res.fault.faultString).to.contain('Time Restriction Policy Validation failed');
                    });
                } else {
                    insomnia.test('Request outside working hours returns 200 - ALLOWED', function () {
                        insomnia.response.to.have.status(200);
                    });
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
