                let tCounter = insomnia.environment.get('throttling_counter');

                tCounter = tCounter ? parseInt(tCounter) : 0;

                tCounter++;

                insomnia.environment.set('throttling_counter', tCounter);


                console.log('Throttling request count:', tCounter);


                if (tCounter <= 3) {
