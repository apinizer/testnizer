              isPrivate: false
              description: ""
              sortKey: -1772438912217
            method: GET
            scripts:
              preRequest: >-
                const testCase = insomnia.iterationData.get('auth_case');


                if (!testCase || testCase === 'SKIP') {
                    console.log('[SKIP] plain-text — bu iterasyonda veri yok');
                    insomnia.execution.skipRequest();
                    return;
                }


                let username, password;


                if (testCase === 'valid') {
                    username = 'erend';
                    password = 'eren';
                }


                if (testCase === 'invalid') {
                    username = 'wrongusername';
                    password = 'wrongpassword';
                }


                insomnia.request.headers.upsert({ key: 'username', value:
                username });

                insomnia.request.headers.upsert({ key: 'password', value:
                password });


                console.log('Test Case:', testCase);

                console.log('Username:', username);

                console.log('Password:', password);
              afterResponse: >-
                const testCase = insomnia.iterationData.get('auth_case');


                if (!testCase || testCase === 'SKIP') { return; }


                console.log('Running test for:', testCase);


                if (testCase === 'valid') {
                    insomnia.test('Valid credentials return 200', function () {
                        insomnia.response.to.have.status(200);
                    });
                }


                if (testCase === 'invalid') {
                    insomnia.test('Invalid credentials return 401', function () {
                        insomnia.response.to.have.status(401);
                    });

                    const res = insomnia.response.json();

                    insomnia.test('Response contains fault object', function () {
                        insomnia.expect(res).to.have.property('fault');
                    });

                    insomnia.test('Fault status code is 401', function () {
                        insomnia.expect(res.fault.faultStatusCode).to.eql('401');
                    });

                    insomnia.test('Fault message indicates authentication failure', function () {
                        insomnia.expect(res.fault.faultString).to.contain('Authentication policy failed');
                    });
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
