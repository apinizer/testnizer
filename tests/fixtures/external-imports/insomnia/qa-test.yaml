                if (runOnce === 'yes') {
                    insomnia.environment.set('quota_counter', 0);
                    console.log('[INIT] quota_counter sıfırlandı');
                }
              afterResponse: >-
                // api-based-quota her 5 iterasyonda da çalışır — counter
                environment'ta tutulur

                let counter = insomnia.environment.get('quota_counter');

                counter = counter ? parseInt(counter) : 0;

                counter++;

                insomnia.environment.set('quota_counter', counter);


                console.log('Quota request count:', counter);


                if (counter <= 4) {
                    insomnia.test('Request allowed within quota limit (request #' + counter + ')', function () {
                        insomnia.response.to.have.status(200);
                    });
                } else {
                    insomnia.test('Request blocked after quota limit (request #' + counter + ')', function () {
                        insomnia.response.to.have.status(429);
                    });

                    const res = insomnia.response.json();

                    insomnia.test('Fault code is ERR-227', function () {
                        insomnia.expect(res.fault.faultCode).to.eql('ERR-227');
                    });

                    insomnia.test('Fault message indicates quota limit', function () {
                        insomnia.expect(res.fault.faultString).to.contain('QUOTA limit');
                    });
