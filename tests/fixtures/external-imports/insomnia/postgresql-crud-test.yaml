      - url: "{{_['baseUrl']}}/create-user"
        name: 1.POST -Create-Employee
        meta:
          id: req_026bde6f80ce485f8c94432bcbb166c1
          created: 1772439184348
          modified: 1772439184348
          isPrivate: false
          description: ""
          sortKey: -1772439183002
        method: POST
        body:
          mimeType: application/json
          text: "{{employee_body}}"
        headers:
          - name: Content-Type
            value: application/json
          - name: Accept
            value: application/json
        scripts:
          preRequest: "// Test için sabit empNo kullan\r

            const empNo = 7;\r

            insomnia.environment.set('test_empNo', empNo);\r

            \r

            const body = {\r

            \    'firstName': 'Mehmet',\r

            \    'lastName': 'Ercan',\r

            \    'hireDate': '2023-04-18',\r

            \    'gender': 'M',\r

            \    'empNo': empNo,\r

            \    'birthDate': '1990-01-01',\r

            };\r

            \r

            insomnia.environment.set('employee_body', JSON.stringify(body));\r

            console.log('Creating employee with empNo:', empNo);"
          afterResponse: "insomnia.test('POST: Status code is 200', function () {\r

            \    insomnia.response.to.have.status(200);\r

            });\r

            \r

            const res = insomnia.response.json();\r

            \r

            insomnia.test('POST: statusCode is 200', function () {\r

            \    insomnia.expect(res.statusCode).to.eql(200);\r

            });\r

            \r

            insomnia.test('POST: statusDescription is OK', function () {\r

            \    insomnia.expect(res.statusDescription).to.eql('OK');\r

            });\r

            \r

            insomnia.test('POST: No errors', function () {\r

            \    insomnia.expect(res.errors).to.be.an('array').that.is.empty;\r

            });\r

            \r

            console.log('✅ Employee created successfully');"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{_['baseUrl']}}/get-employee"
        name: 2.GET-Employee
        meta:
          id: req_7c69f7c642e54ad4a6e04af1f464d3a3
          created: 1772439184351
          modified: 1772441611955
          isPrivate: false
          description: ""
          sortKey: -1772439183001
        method: GET
        parameters:
          - name: empNo
            value: "{{test_empNo}}"
            disabled: false
        headers:
          - name: Accept
            value: application/json
        scripts:
          preRequest: "const empNo = insomnia.environment.get('test_empNo');\r

            console.log('Reading employee with empNo:', empNo);"
          afterResponse: |-
            insomnia.test('GET #1: Status code is 200', function () {
                insomnia.response.to.have.status(200);
            });

            const res = insomnia.response.json();

            insomnia.test('GET #1: statusCode is 200', function () {
                insomnia.expect(res.statusCode).to.eql(200);
            });

            insomnia.test('GET #1: numRows is 1', function () {
                insomnia.expect(res.numRows).to.eql(1);
            });

            insomnia.test('GET #1: data array has 1 employee', function () {
                insomnia.expect(res.data).to.be.an('array');
                insomnia.expect(res.data.length).to.eql(1);
            });

            const employee = res.data[0];
            console.log('✅ Employee read successfully:', employee);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
