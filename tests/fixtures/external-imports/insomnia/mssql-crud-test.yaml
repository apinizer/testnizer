      - url: "{{_['baseUrl']}}/Create-employee"
        name: 1.POST-Create-Employee
        meta:
          id: req_01fa84f4c52c4be2ae44d7489cc6ee89
          created: 1772439129943
          modified: 1772439129943
          isPrivate: false
          description: ""
          sortKey: -1772439128407
        method: POST
        body:
          mimeType: application/json
          text: "{{employee_body}}"
        headers:
          - name: Content-Type
            value: application/json
          - name: Accept
            value: application/json
        scripts:
          preRequest: "// Test için sabit empNo kullan\r

            const empNo = 7;\r

            insomnia.environment.set('test_empNo', empNo);\r

            \r

            const body = {\r

            \    'firstName': 'Mehmet',\r

            \    'lastName': 'Ercan',\r

            \    'hireDate': '2023-04-18',\r

            \    'gender': 'M',\r

            \    'empNo': empNo,\r

            \    'birthDate': '1990-01-01',\r

            };\r

            \r

            insomnia.environment.set('employee_body', JSON.stringify(body));\r

            console.log('Creating employee with empNo:', empNo);"
          afterResponse: "insomnia.test('POST: Status code is 200', function () {\r

            \    insomnia.response.to.have.status(200);\r

            });\r

            \r

            const res = insomnia.response.json();\r

            \r

            insomnia.test('POST: statusCode is 200', function () {\r

            \    insomnia.expect(res.statusCode).to.eql(200);\r

            });\r

            \r

            insomnia.test('POST: statusDescription is OK', function () {\r

            \    insomnia.expect(res.statusDescription).to.eql('OK');\r

            });\r

            \r

            insomnia.test('POST: No errors', function () {\r

            \    insomnia.expect(res.errors).to.be.an('array').that.is.empty;\r

            });\r

            \r

            console.log('✅ Employee created successfully');"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
