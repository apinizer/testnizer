          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{baseUrl}}/employee"
        name: 4. GET - Read After Update
        meta:
          id: req_afda31cb287f46978b5c35b53ca0e77e
          created: 1772439270931
          modified: 1772439270931
          isPrivate: false
          description: ""
          sortKey: -1772439269659
        method: GET
        parameters:
          - name: empNo
            value: "{{test_empNo}}"
            disabled: false
        scripts:
          preRequest: |-
            const empNo = insomnia.environment.get('test_empNo');
            console.log('Reading updated employee with empNo:', empNo);
          afterResponse: >-
            insomnia.test('GET #2: Status code is 200', function () {
                insomnia.response.to.have.status(200);
            });


            const res = insomnia.response.json();


            insomnia.test('GET #2: statusCode is 200', function () {
                insomnia.expect(res.statusCode).to.eql(200);
            });


            insomnia.test('GET #2: numRows is 1', function () {
