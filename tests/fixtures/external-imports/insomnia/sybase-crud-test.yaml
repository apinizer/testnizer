collection:
  - name: Sybase Employee - CRUD Test Flow
    meta:
      id: fld_7787631316414d9d8baa221e2e94e543
      created: 1772439270888
      modified: 1777986453934
      sortKey: -1772439269663
      description: "Sequential CRUD flow: Create → Read → Update → Read → Delete → Read"
    children:
      - url: "{{baseUrl}}/employee"
        name: 1. POST - Create Employee
        meta:
          id: req_483116f7d2a845eab285de08b3a0a5c5
          created: 1772439270894
          modified: 1772439270894
          isPrivate: false
          description: ""
          sortKey: -1772439269662
        method: POST
        body:
          mimeType: text/plain
          text: "{{employee_body}}"
        headers:
          - name: Content-Type
            value: application/json
        scripts:
          preRequest: |-
            // Test için sabit empNo kullan
            const empNo = 7;
            insomnia.environment.set('test_empNo', empNo);

            const body = {
                'firstName': 'Eren',
                'lastName': 'Dile',
                'hireDate': '18-04-2020',
                'gender': 'M',
                'empNo': empNo,
                'birthDate': '18-04-2001'
            };

            insomnia.environment.set('employee_body', JSON.stringify(body));
            console.log('Creating employee with empNo:', empNo);
          afterResponse: |-
            insomnia.test('POST: Status code is 200', function () {
                insomnia.response.to.have.status(200);
            });

            const res = insomnia.response.json();

            insomnia.test('POST: statusCode is 200', function () {
                insomnia.expect(res.statusCode).to.eql(200);
            });

            insomnia.test('POST: statusDescription is OK', function () {
                insomnia.expect(res.statusDescription).to.eql('OK');
            });

            insomnia.test('POST: No errors', function () {
                insomnia.expect(res.errors).to.be.an('array').that.is.empty;
            });

            console.log('✅ Employee created successfully');
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{baseUrl}}/employee"
        name: 2. GET - Read After Create
        meta:
          id: req_072f262307a0423b8fbe4ba3c6de41e7
          created: 1772439270918
          modified: 1772439270918
          isPrivate: false
          description: ""
          sortKey: -1772439269661
        method: GET
        parameters:
          - name: empNo
            value: "{{test_empNo}}"
            disabled: false
        scripts:
          preRequest: |-
            const empNo = insomnia.environment.get('test_empNo');
            console.log('Reading employee with empNo:', empNo);
          afterResponse: >-
            insomnia.test('GET #1: Status code is 200', function () {
                insomnia.response.to.have.status(200);
            });


            const res = insomnia.response.json();


            insomnia.test('GET #1: statusCode is 200', function () {
                insomnia.expect(res.statusCode).to.eql(200);
            });


            insomnia.test('GET #1: numRows is 1', function () {
                insomnia.expect(res.numRows).to.eql(1);
            });


            insomnia.test('GET #1: data array has 1 employee', function () {
                insomnia.expect(res.data).to.be.an('array').with.lengthOf(1);
            });


            const employee = res.data[0];


            insomnia.test('GET #1: Employee has correct empNo', function () {
                insomnia.expect(employee.emp_no).to.eql(7);
            });


            insomnia.test('GET #1: Employee has correct firstName', function ()
            {
                insomnia.expect(employee.first_name).to.eql('Eren');
            });


            insomnia.test('GET #1: Employee has correct lastName', function () {
                insomnia.expect(employee.last_name).to.eql('Dile');
            });


            insomnia.test('GET #1: Employee has correct gender', function () {
                insomnia.expect(employee.gender).to.eql('M');
            });


            console.log('✅ Employee read successfully:', employee);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
