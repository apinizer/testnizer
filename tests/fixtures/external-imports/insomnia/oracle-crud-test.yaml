        method: GET
        parameters:
          - name: empNo
            value: "{{test_empNo}}"
            disabled: false
        scripts:
          preRequest: |-
            const empNo = insomnia.environment.get('test_empNo');
            console.log('Verifying deletion for empNo:', empNo);
          afterResponse: >-
            insomnia.test('GET #3: Status code is 200', function () {
                insomnia.response.to.have.status(200);
            });


            const res = insomnia.response.json();


            insomnia.test('GET #3: statusCode is 200', function () {
                insomnia.expect(res.statusCode).to.eql(200);
            });


            insomnia.test('GET #3: numRows is 0 (employee deleted)', function ()
            {
                insomnia.expect(res.numRows).to.eql(0);
            });


            insomnia.test('GET #3: data array is empty', function () {
                insomnia.expect(res.data).to.be.an('array').that.is.empty;
