                  mimeType: application/json
                  text: |-
                    {
                    	"id": 99,
                      "name": "contact_{% faker 'randomFirstName' %}",
                      "phone": "{% faker 'randomPhoneNumber' %}",
                      "email": "{% faker 'randomEmail' %}",
                      "address1": "123 Main St",
                      "address2": "Apt 4B",
                      "postalCode": "34340",
                      "note": "VIP Customer"
                    }
                headers:
                  - name: Content-Type
                    value: application/json
                  - name: Accept
                    value: "*/*"
                scripts:
                  afterResponse: "// 1. Önce her ihtimale karşı eski değişkeni temizle\r

                    insomnia.environment.unset(\"current_contact_id\");\r

                    \r

                    if (insomnia.response.code === 201 || insomnia.response.code
                    === 200) {\r

                    \    \r

                    \    // 2. Location header'ını oku (Örn: .../contacts/45)\r

                    \    const locationHeader =
                    insomnia.response.headers.get(\"Location\");\r

                    \    \r

                    \    if (locationHeader) {\r

                    \        // 3. URL'in en sonundaki ID değerini çek\r

                    \        const contactId =
                    locationHeader.split('/').pop();\r

                    \        \r

                    \        // 4. Yeni contact ID'sini kaydet\r

                    \        insomnia.environment.set(\"current_contact_id\",
                    contactId);\r

                    \        \r

                    \        console.log(\"Yeni Contact ID başarıyla alındı: \"
                    + contactId);\r

                    \    } else {\r

                    \        console.error(\"HATA: Location header'ı
                    bulunamadı!\");\r

                    \    }\r

                    }\r

                    \r

                    insomnia.test(\"Status code is 201\", function () {\r

                    \    insomnia.response.to.have.status(201);\r

                    });"
