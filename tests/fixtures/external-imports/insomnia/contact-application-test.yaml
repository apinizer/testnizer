                  mimeType: application/json
                  text: |-
                    {
                    		"id": 99,
                        "name": "mehmet_{% faker 'randomFirstName' %}",
                        "username": "user_{% faker 'randomInt' %}",
                        "password": "password123",
                        "age": 23,
                        "salary": 2000000.0
                    }
                headers:
                  - name: Content-Type
                    value: application/json
                  - name: Accept
                    value: "*/*"
                scripts:
                  afterResponse: "// 1. Önce her ihtimale karşı eski değişkeni temizle\r

                    insomnia.environment.unset(\"current_user_id\");\r

                    \r

                    // 2. Sadece başarılı oluşturma (201) durumunda işlem yap\r

                    if (insomnia.response.code === 201 || insomnia.response.code
                    === 200) {\r

                    \    \r

                    \    // 3. Location header'ını oku\r

                    \    const locationHeader =
                    insomnia.response.headers.get(\"Location\");\r

                    \    \r

                    \    if (locationHeader) {\r

                    \        // 4. URL'i '/' karakterlerinden böl ve en sondaki
                    elemanı (ID) al\r

                    \        const userId = locationHeader.split('/').pop();\r

                    \        \r

                    \        // 5. Elde ettiğimiz ID'yi çevre değişkenine
                    (environment) kaydet\r

                    \        insomnia.environment.set(\"current_user_id\",
                    userId);\r

                    \        \r

                    \        console.log(\"Yeni Kullanıcı ID'si Location
                    Header'dan alındı: \" + userId);\r

                    \    } else {\r

                    \        console.error(\"HATA: Location header'ı
                    bulunamadı!\");\r

                    \    }\r

                    }\r

                    insomnia.test(\"Status code is 201\", function () {\r

                    \    insomnia.response.to.have.status(201);\r

                    });"
