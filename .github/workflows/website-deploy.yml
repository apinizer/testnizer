name: Deploy website to GitHub Pages

# Monorepo website deploy — builds the Astro site in `website/` and publishes it
# to GitHub Pages (custom domain www.testnizer.com).
#
# STAGE 1 (current): manual-only. The repo's Pages must be enabled with
# "GitHub Actions" as the source and the custom domain www.testnizer.com moved
# here from apinizer/testnizer-website before this can deploy successfully.
# STAGE 2 enables the auto triggers below (push on website/**, the
# repository_dispatch from testnizer's build.yml after a release, and the
# daily safety-net rebuild).

on:
  workflow_dispatch:
  # ── enabled in Stage 2, after Pages + custom-domain migration ──
  # push:
  #   branches: [main]
  #   paths: ['website/**', '.github/workflows/website-deploy.yml']
  # repository_dispatch:
  #   types: [testnizer-release-published]
  # schedule:
  #   - cron: '17 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # The build fetches the latest release metadata from the GitHub API;
        # GITHUB_TOKEN dodges the 60/hr anonymous rate limit (public-read only).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
