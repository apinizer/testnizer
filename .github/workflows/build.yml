name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    # Monorepo hygiene: a website-only change to main must not trigger the app
    # build. Release tags always bump package.json (a non-website file), so the
    # `v*` release path is never skipped by this filter.
    paths-ignore:
      - 'website/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'website/**'
  workflow_dispatch:

# Allow only one concurrent build per ref — cancel stale ones.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Cleanup — free up Actions storage BEFORE building anything. The org quota
  # fills up surprisingly fast (six platform artifacts per tag × dozens of tag
  # runs × default 90-day retention), and once it's exhausted GitHub starts
  # silently refusing new artifact uploads — which is what's been killing our
  # release builds.
  #
  # This job:
  #   1. Deletes all but the most recent 10 artifacts (regardless of source
  #      workflow) — release builds are published straight to this repo's
  #      Releases by `electron-builder --publish always`, so the build
  #      artifacts here are just transient handoff between jobs.
  #   2. Deletes every cache entry — npm cache rehydrates in a few seconds
  #      and stale caches are the primary storage hog for matrix builds.
  #   3. Deletes workflow runs older than the most recent 30 (logs go with
  #      the run).
  #
  # Runs in parallel-friendly mode: failures don't block builds. `quality`
  # below uses `needs: cleanup` + `if: always()` so a transient API hiccup
  # in cleanup never aborts a real release.
  # ---------------------------------------------------------------------------
  cleanup:
    name: Free Actions storage (artifacts + caches + old runs)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old artifacts (keep latest 10)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          # `gh api --paginate` flattens .artifacts across pages.
          gh api -X GET /repos/${{ github.repository }}/actions/artifacts \
            --paginate --jq '.artifacts[] | "\(.id) \(.created_at)"' \
            | sort -k2 \
            | head -n -10 \
            | awk '{print $1}' \
            | while read -r id; do
                [ -z "$id" ] && continue
                echo "Deleting artifact $id"
                gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/$id" \
                  || echo "  (already gone or permission denied)"
              done

      - name: Delete all caches
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          gh api -X GET /repos/${{ github.repository }}/actions/caches \
            --paginate --jq '.actions_caches[] | .id' \
            | while read -r id; do
                [ -z "$id" ] && continue
                echo "Deleting cache $id"
                gh api -X DELETE "/repos/${{ github.repository }}/actions/caches/$id" \
                  || echo "  (already gone)"
              done

      - name: Delete old workflow runs (keep latest 30)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          gh api -X GET /repos/${{ github.repository }}/actions/runs \
            --paginate --jq '.workflow_runs[] | "\(.id) \(.created_at)"' \
            | sort -k2 \
            | head -n -30 \
            | awk '{print $1}' \
            | while read -r id; do
                [ -z "$id" ] && continue
                echo "Deleting run $id (logs included)"
                gh api -X DELETE "/repos/${{ github.repository }}/actions/runs/$id" \
                  || echo "  (already gone or in-progress)"
              done

  # ---------------------------------------------------------------------------
  # Quality gate — runs once before any platform build. Blocks the matrix on
  # type errors, lint errors, or failing unit tests so we don't waste CI minutes
  # building six platform packages from broken code.
  # ---------------------------------------------------------------------------
  quality:
    name: Lint + Typecheck + Unit tests
    needs: cleanup
    # Cleanup is best-effort — never block a build on a storage-API hiccup.
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # The `pretest:unit` hook in package.json invokes
      # `scripts/ensure-native-abi.js node`, which rebuilds better-sqlite3
      # for the system Node ABI before vitest spawns. The platform build
      # jobs below have their own `prebuild:*` hook that flips the binary
      # back to Electron's ABI, so test → build → test cycles never leave
      # node_modules in a broken state. No manual `npm rebuild` here.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # macOS — ONE job builds BOTH arches (arm64 native + x64 cross-build) on a
  # single Apple-Silicon runner, in a single `electron-builder --mac --arm64
  # --x64` invocation. This is deliberate: two separate per-arch jobs each
  # generated their OWN `latest-mac.yml` and published it to the same release,
  # clobbering each other so the surviving manifest listed only ONE arch — the
  # other arch's users got "no update" or a checksum mismatch (v1.4.16 mac
  # auto-update bug). A single invocation emits ONE manifest covering both
  # arches. (better-sqlite3 ships prebuilt darwin-x64 + darwin-arm64 binaries,
  # so the x64 cross-build on the arm64 host is reliable.)
  # ---------------------------------------------------------------------------
  build-mac:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    name: macOS (arm64 + x64)
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # GitHub's macOS runner image bumped its default Python to 3.14, which
      # node-gyp 9 can't drive (distutils was removed in Python 3.12) — so
      # better-sqlite3 fails to compile whenever no matching prebuild is found.
      # Pin a node-gyp-friendly Python (<=3.11) for a deterministic native
      # build that survives runner-image drift.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (host arch only)
        run: npm ci

      # F25: bundle the per-platform static curl into resources/curl/ so the
      # TLS 1.0/1.1 sidecar works on enterprise hosts without a system curl.
      # Both arches are packaged in one run, so fetch BOTH curl binaries.
      - name: Download bundled curl (darwin arm64 + x64)
        run: |
          node scripts/download-curl-binaries.js --target=darwin-arm64
          node scripts/download-curl-binaries.js --target=darwin-x64

      # The Vite/Rollup main-process bundle pulls in the full Electron deps
      # graph (better-sqlite3, soap, grpc, etc.) and on macos-14 (arm64) the
      # default 2 GB Node heap is occasionally exceeded during minification.
      # Bump the heap so the build is deterministic.
      - name: Build renderer + main
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      # Smoke is a HARD gate on purpose: it launches the production main bundle
      # and is the ONLY thing that catches a main-process load crash (e.g. the
      # v1.4.19 ERR_REQUIRE_ESM regression, where an ESM-only dep externalized
      # into the CJS main bundle crashed the app before any window opened). Do
      # NOT make this continue-on-error — a green-but-broken mac build would
      # ship a crash-on-launch app. NOTE: win/linux jobs do NOT run smoke, so
      # that same crash shipped there undetected — see TODO to add smoke there.
      - name: E2E smoke tests (Playwright)
        run: npm run test:e2e:smoke

      - name: E2E HTTP suite (network-dependent; failures non-blocking for now)
        # Sprint 2 introduced this suite; some tests assume specific httpbin
        # response shapes and need iteration. Track via STATUS.md before making
        # this a hard gate.
        run: npm run test:e2e:http
        continue-on-error: true
        env:
          HTTPBIN_URL: ${{ vars.HTTPBIN_URL || 'https://httpbin.org' }}
          BADSSL_BASE: ${{ vars.BADSSL_BASE || 'https://badssl.com' }}

      - name: Package (dmg + zip, arm64 + x64)
        env:
          # Developer ID signing + notarization turn on ONLY when these secrets
          # exist. scripts/ad-hoc-sign.js + notarize.js both no-op without them,
          # so unsigned/ad-hoc builds keep working byte-for-byte. Auto-discovery
          # is enabled solely when a real cert (.p12 via CSC_LINK) is provided —
          # otherwise it stays off so electron-builder doesn't try to sign.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # One invocation for both arches → a SINGLE latest-mac.yml listing both.
        # `--publish always` on tag pushes uploads + generates the manifest for
        # electron-updater. On main / workflow_dispatch we never publish.
        run: |
          # GitHub renders an absent secret as an empty STRING, not an unset var.
          # electron-builder then treats the empty CSC_LINK as a cert PATH,
          # resolves '' to the workspace dir, and dies with "<dir> not a file"
          # before the ad-hoc/notarize hooks ever matter. Drop the empties so the
          # vars are genuinely undefined (the v1.4.10 unsigned behaviour).
          if [ -z "${CSC_LINK}" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
            echo "No CSC_LINK secret — ad-hoc signing only (notarize hook self-skips)."
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --mac --arm64 --x64 --publish always
          else
            npx electron-builder --mac --arm64 --x64 --publish never
          fi
        shell: bash

      - name: Verify native binaries (both arches)
        run: |
          node scripts/verify-natives.js --platform=darwin --arch=arm64
          node scripts/verify-natives.js --platform=darwin --arch=x64

  # ---------------------------------------------------------------------------
  # Linux — native x64 on ubuntu-latest, native arm64 on ubuntu-24.04-arm.
  # Both run electron-rebuild against the host's glibc, which matches the
  # target users (no cross-compile gymnastics).
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux ${{ matrix.arch }}
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 libopenjp2-tools rpm fakeroot dpkg xvfb

      # electron-builder's bundled fpm has bitten us on both arches:
      #   - arm64 runner: the bundled binary is Linux x86, fails with
      #     "Exec format error".
      #   - x64 runner: depending on the cache / electron-builder version,
      #     the bundled fpm can fail to land in PATH at all
      #     ("fpm: executable file not found in $PATH").
      # Install fpm via the system Ruby on both arches and tell
      # electron-builder to use it (USE_SYSTEM_FPM=true) for a deterministic
      # `.deb` build.
      - name: Install system fpm
        run: |
          sudo apt-get install -y --no-install-recommends ruby ruby-dev rubygems
          sudo gem install --no-document fpm

      - name: Install deps (host arch only)
        run: npm ci

      # F25: bundle the per-platform static curl for the TLS 1.0/1.1 sidecar.
      - name: Download bundled curl (linux-${{ matrix.arch }})
        run: node scripts/download-curl-binaries.js --target=linux-${{ matrix.arch }}

      - name: Build renderer + main
        run: npm run build

      # Launch-smoke the production bundle BEFORE packaging — Linux's Electron
      # needs a virtual display, hence xvfb-run. This is the gate that would
      # have caught the v1.4.19 main-process load crash (ERR_REQUIRE_ESM) /
      # renderer blank-UI on Linux: previously only the mac job smoke-tested, so
      # those crashes shipped here undetected. Hard gate — no continue-on-error.
      - name: E2E smoke tests (Playwright, xvfb)
        run: xvfb-run -a npm run test:e2e:smoke

      - name: Package (AppImage + deb, ${{ matrix.arch }})
        env:
          USE_SYSTEM_FPM: 'true'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --linux --${{ matrix.arch }} --publish always
          else
            npx electron-builder --linux --${{ matrix.arch }} --publish never
          fi
        shell: bash

      - name: Verify native binaries
        run: node scripts/verify-natives.js --platform=linux --arch=${{ matrix.arch }}

  # ---------------------------------------------------------------------------
  # Windows — ONE job builds BOTH arches (x64 native + arm64 cross-build) on a
  # single x64 runner, in a single `electron-builder --win --x64 --arm64`
  # invocation. Like macOS above, two per-arch jobs each published their own
  # `latest.yml` and clobbered each other on the shared release, so the manifest
  # listed only one arch and the other arch's users couldn't auto-update
  # (v1.4.16). A single invocation emits ONE manifest covering both. The arm64
  # cross-build is reliable because better-sqlite3 ships a prebuilt win32-arm64
  # binary (prebuild-install fetches it; no node-gyp compile). `verify-natives`
  # below asserts each unpacked app carries the matching-arch .node.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64 + arm64)
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      # Surfaced as job env so step `if:` can gate on `env.SIGNPATH_API_TOKEN`
      # (the `secrets` context isn't reliably usable in step `if:` conditions).
      # Empty until the SignPath OSS application is approved — see SIGNING.md.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Same node-gyp vs Python 3.12+ break as macOS: the Windows runner image
      # dropped distutils, so better-sqlite3's node-gyp fallback dies with
      # "No module named 'distutils'". Pin a node-gyp-friendly Python.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (host arch only)
        run: npm ci

      # F25: bundle the per-platform static curl for the TLS 1.0/1.1 sidecar.
      # Both arches are packaged in one run, so fetch BOTH curl binaries.
      - name: Download bundled curl (win32 x64 + arm64)
        run: |
          node scripts/download-curl-binaries.js --target=win32-x64
          node scripts/download-curl-binaries.js --target=win32-arm64

      # The smoke test launches the built production bundle, so it must exist
      # first. mac + linux build before smoke; Windows was missing this step, so
      # smoke died with "Build artifact not found: out\main\index.js" before it
      # could ever launch (the Windows job only runs on tags, so main-push CI —
      # where builds are skipped — never surfaced it).
      - name: Build renderer + main
        run: npm run build

      # Launch-smoke the production bundle BEFORE packaging. The windows-latest
      # runner has an interactive desktop, so Electron launches without a
      # virtual display. This is the gate that would have caught the v1.4.19
      # main-process load crash (ERR_REQUIRE_ESM) / renderer blank-UI on Windows
      # — previously only the mac job smoke-tested, so those crashes shipped here
      # undetected. Hard gate — no continue-on-error.
      - name: E2E smoke tests (Playwright)
        run: npm run test:e2e:smoke

      - name: Package (nsis, x64 + arm64)
        # SignPath (free OSS Authenticode signing) activates only when the
        # SIGNPATH_API_TOKEN secret exists. Until then this is byte-identical
        # to before: tag builds publish immediately, unsigned. When the secret
        # IS present we build WITHOUT publishing, sign the installer in the
        # steps below, then publish the signed artifacts — otherwise the
        # already-published unsigned .exe would win.
        #
        # One invocation for both arches → a SINGLE latest.yml listing both.
        shell: bash
        env:
          SIGNPATH_ACTIVE: ${{ env.SIGNPATH_API_TOKEN != '' }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* && "${SIGNPATH_ACTIVE}" != "true" ]]; then
            npx electron-builder --win --x64 --arm64 --publish always
          else
            npx electron-builder --win --x64 --arm64 --publish never
          fi

      # ─── Windows code signing — SignPath Foundation (guarded skeleton) ─────
      # All three steps are inert until SIGNPATH_API_TOKEN +
      # SIGNPATH_ORGANIZATION_ID are added (after the signpath.io/open-source
      # application is approved — see SIGNING.md). Current builds are 100%
      # unaffected. On approval: fill the real project / policy / artifact
      # slugs below, implement the publish step, and VALIDATE WITH A TEST TAG —
      # the signed .exe's sha512 must match the regenerated latest.yml or
      # electron-updater rejects the update. That last handoff is the one piece
      # that cannot be verified without the real certificate.
      - name: Upload unsigned installer (SignPath input)
        id: upload-unsigned
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.SIGNPATH_API_TOKEN != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-win
          path: dist/*.exe

      - name: Sign with SignPath
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.SIGNPATH_API_TOKEN != '' }}
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: testnizer
          signing-policy-slug: release-signing        # TODO: real slug at approval
          artifact-configuration-slug: nsis-installer  # TODO: real slug at approval
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed

      - name: Publish signed installer
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.SIGNPATH_API_TOKEN != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # FINALIZE AT APPROVAL (tripwire — fails loudly so an unsigned build
          # is never mistaken for signed): replace dist/*.exe with the signed
          # dist-signed/*.exe, recompute the electron-updater latest.yml sha512
          # + size for the signed file, then `gh release upload` both. Verify
          # auto-update end-to-end with a test tag before removing this guard.
          echo "::error::SignPath signing is enabled but the publish-signed step is not finalized yet. See SIGNING.md → Windows."
          exit 1

      - name: Verify native binaries (both arches)
        run: |
          node scripts/verify-natives.js --platform=win32 --arch=x64
          node scripts/verify-natives.js --platform=win32 --arch=arm64

  # ---------------------------------------------------------------------------
  # Update the release body on tag pushes.
  #
  # The six installer assets (dmg / exe / deb / AppImage / zip) plus the
  # electron-updater `latest*.yml` manifests are already on this repo's
  # Releases — each platform job runs
  # `electron-builder ... --publish always` and uploads its own artifacts
  # directly to the release. This job therefore does NOT need to download
  # any GitHub Actions artifact; it only:
  #   1. Pulls the v<tag> changelog block from the website repo.
  #   2. Overwrites the release body with that block via `gh release edit`.
  #   3. Pings the website to rebuild so the /download page picks up the
  #      new version.
  #
  # Killing the upload-artifact / download-artifact dance avoids the
  # GitHub Actions storage-quota wall that silently broke v1.4.2 publish.
  # ---------------------------------------------------------------------------
  release:
    name: Update release notes
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Check out the tag so docs/release-notes/v<tag>.md is on disk. Without
      # this the job ran in an empty workspace, the `-s` test below always
      # failed, and every release since the monorepo move (v1.4.12+) shipped the
      # fallback stub instead of the real notes. fetch-depth: 1 at the tag ref
      # is enough — we only read one file.
      - uses: actions/checkout@v4
      # Read the release notes for this tag from the in-repo single source of
      # truth: docs/release-notes/v<tag>.md (the same content mirrored into the
      # website changelog). Monorepo move: this used to curl the changelog out
      # of apinizer/testnizer-website — now it's a local file, no cross-repo
      # fetch. Falls back to a one-line stub if the tag file isn't present yet,
      # so the release still drafts.
      - name: Extract release notes
        run: |
          TAG="${{ github.ref_name }}"
          NOTES="docs/release-notes/${TAG}.md"
          if [ -s "$NOTES" ]; then
            cp "$NOTES" release-notes.md
          else
            echo "Release notes for $TAG not yet published — see https://www.testnizer.com/docs/changelog/" > release-notes.md
          fi
          echo "----- release-notes.md -----"
          cat release-notes.md

      # The release was already published by the platform jobs via
      # `electron-builder --publish always`. We only need to overwrite its
      # body with the changelog block.
      - name: Update release body
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo apinizer/testnizer \
            --notes-file release-notes.md \
            --title "Testnizer ${{ github.ref_name }}"

      # SHA-256 every user-facing installer and publish a checksums.txt to the
      # release. The website's "Verifying releases" doc points users here. Runs
      # after the platform jobs (needs:) so every installer is already uploaded;
      # the .yml / .blockmap auto-update metadata is intentionally skipped.
      - name: Publish checksums.txt
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          work="$(mktemp -d)"
          ( cd "$work"
            gh release download "$TAG" --repo apinizer/testnizer \
              --pattern '*.dmg' --pattern '*.exe' --pattern '*.deb' \
              --pattern '*.AppImage' --pattern '*.zip'
            sha256sum * > checksums.txt
            echo '----- checksums.txt -----'; cat checksums.txt
            gh release upload "$TAG" checksums.txt --repo apinizer/testnizer --clobber )

      # Kick the website rebuild so the /download page picks up the new
      # version + asset URLs as soon as the release is up. Monorepo: the site
      # now lives in THIS repo under website/, so dispatch to ourselves — the
      # website-deploy.yml workflow listens for `testnizer-release-published`.
      #
      # `continue-on-error: true` keeps a dispatch hiccup from failing the
      # release job (the release itself is already published above); a manual
      # `gh workflow run website-deploy.yml` is always available as a fallback.
      - name: Notify website to rebuild
        continue-on-error: true
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/apinizer/testnizer/dispatches \
            -d '{"event_type":"testnizer-release-published","client_payload":{"tag":"${{ github.ref_name }}"}}'
