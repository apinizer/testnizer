name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent build per ref — cancel stale ones.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate — runs once before any platform build. Blocks the matrix on
  # type errors, lint errors, or failing unit tests so we don't waste CI minutes
  # building six platform packages from broken code.
  # ---------------------------------------------------------------------------
  quality:
    name: Lint + Typecheck + Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # macOS — one job per arch, each on a native runner so better-sqlite3's
  # prebuild-install pulls the correct darwin-{x64,arm64} binary and
  # electron-rebuild compiles against the host's arch if a prebuild is missing.
  # ---------------------------------------------------------------------------
  build-mac:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    name: macOS ${{ matrix.arch }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon
          - arch: x64
            runner: macos-13   # Intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (host arch only)
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: E2E smoke tests (Playwright)
        run: npm run test:e2e:smoke

      - name: E2E HTTP suite (network-dependent; failures non-blocking for now)
        # Sprint 2 introduced this suite; some tests assume specific httpbin
        # response shapes and need iteration. Track via STATUS.md before making
        # this a hard gate.
        run: npm run test:e2e:http
        continue-on-error: true
        env:
          HTTPBIN_URL: ${{ vars.HTTPBIN_URL || 'https://httpbin.org' }}
          BADSSL_BASE: ${{ vars.BADSSL_BASE || 'https://badssl.com' }}

      - name: Package (dmg + zip, ${{ matrix.arch }})
        env:
          # Skip signing in CI unless the secrets are actually configured.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # `--publish always` on tag pushes uploads + generates latest-mac.yml
        # for electron-updater. On main/PR builds we never publish.
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --mac --${{ matrix.arch }} --publish always
          else
            npx electron-builder --mac --${{ matrix.arch }} --publish never
          fi
        shell: bash

      - name: Verify native binaries
        run: node scripts/verify-natives.js --platform=darwin --arch=${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            dist/ready-packages/*.dmg
            dist/ready-packages/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux — native x64 on ubuntu-latest, native arm64 on ubuntu-24.04-arm.
  # Both run electron-rebuild against the host's glibc, which matches the
  # target users (no cross-compile gymnastics).
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux ${{ matrix.arch }}
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 libopenjp2-tools rpm fakeroot dpkg

      - name: Install deps (host arch only)
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Package (AppImage + deb, ${{ matrix.arch }})
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --linux --${{ matrix.arch }} --publish always
          else
            npx electron-builder --linux --${{ matrix.arch }} --publish never
          fi
        shell: bash

      - name: Verify native binaries
        run: node scripts/verify-natives.js --platform=linux --arch=${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            dist/ready-packages/*.AppImage
            dist/ready-packages/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — x64 on windows-latest (native), arm64 on windows-11-arm (native).
  # Running each arch on its own native host is the only reliable way to get
  # the correct better_sqlite3.node into the NSIS installer.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows ${{ matrix.arch }}
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (host arch only)
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Package (nsis + zip, ${{ matrix.arch }})
        # PowerShell on windows-latest, bash on windows-11-arm — use a
        # cross-shell check via the GITHUB_REF env.
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --win --${{ matrix.arch }} --publish always
          else
            npx electron-builder --win --${{ matrix.arch }} --publish never
          fi

      - name: Verify native binaries
        run: node scripts/verify-natives.js --platform=win32 --arch=${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: |
            dist/ready-packages/*.exe
            dist/ready-packages/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Draft GitHub Release on tag pushes — collects all six artifacts.
  # ---------------------------------------------------------------------------
  release:
    name: Draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*
          repository: apinizer/testnizer-releases
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN }}
