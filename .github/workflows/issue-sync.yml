name: Issue sync

# Drives the status:* label lifecycle for issues in THIS repo as code moves
# from PR → merge → release. Since the consolidation, issues and code live in
# the same repo (apinizer/testnizer), so this runs against the built-in
# GITHUB_TOKEN — no cross-repo RELEASE_TOKEN needed.
#
# Lifecycle:
#   PR opened/edited  → comment + label status:in-review
#   PR merged to main → comment + label status:needs-verification
#   release tag v*    → comment "Released in <tag>" + label status:released + CLOSE
#
# CONVENTION — reference a release-tracked issue in the PR body / commit message
# as either:
#   issue #<N>            (preferred)
#   apinizer/testnizer#<N>
# Deliberately NOT "Fixes #N" / "Closes #N": those let GitHub auto-close at
# MERGE, which would skip the release gate. We want issues to close only once a
# build that contains the fix actually ships. Plain "#N" is avoided too — it
# would false-match PR numbers ("PR #45").

on:
  pull_request:
    types: [opened, edited, reopened, closed]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync issues for (e.g. v1.4.11)'
        required: true

permissions:
  contents: read
  issues: write

env:
  # gh defaults to GITHUB_REPOSITORY; pin it explicitly for clarity.
  GH_REPO: ${{ github.repository }}
  # Shared ref extractor: "issue #12" or "apinizer/testnizer#12" → 12.
  REF_GREP: (issue #|apinizer/testnizer#)[0-9]+

jobs:
  # ── PR opened / edited / reopened (not yet merged) → in-review ──────────────
  # Skipped for fork PRs: GITHUB_TOKEN is read-only there and can't edit issues.
  pr-open:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Comment + label referenced issues (in-review)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TEXT: ${{ github.event.pull_request.title }}${{ '\n' }}${{ github.event.pull_request.body }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -uo pipefail
          refs=$(printf '%s' "$PR_TEXT" \
            | grep -oiE "$REF_GREP" \
            | grep -oE '[0-9]+' | sort -un || true)
          if [ -z "$refs" ]; then echo "No release-issue refs in PR."; exit 0; fi
          fail=0
          for n in $refs; do
            echo "→ #$n: in-review"
            gh issue comment "$n" \
              --body "🔧 Fix in progress — PR #${PR_NUM}: ${PR_URL}" \
              || { echo "::error::comment #$n failed"; fail=1; }
            gh issue edit "$n" \
              --add-label "status:in-review" --remove-label "status:triage" \
              || { echo "::error::label #$n failed"; fail=1; }
          done
          [ "$fail" -eq 0 ] || { echo "One or more issue updates failed."; exit 1; }

  # ── PR merged to main → needs-verification ─────────────────────────────────
  pr-merged:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Comment + label referenced issues (needs-verification)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TEXT: ${{ github.event.pull_request.title }}${{ '\n' }}${{ github.event.pull_request.body }}
          PR_NUM: ${{ github.event.pull_request.number }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -uo pipefail
          refs=$(printf '%s' "$PR_TEXT" \
            | grep -oiE "$REF_GREP" \
            | grep -oE '[0-9]+' | sort -un || true)
          if [ -z "$refs" ]; then echo "No release-issue refs in PR."; exit 0; fi
          short="${MERGE_SHA:0:7}"
          fail=0
          for n in $refs; do
            echo "→ #$n: needs-verification"
            gh issue comment "$n" \
              --body "✅ Merged to main (\`${short}\`, PR #${PR_NUM}). It ships in the next release — re-test on that build." \
              || { echo "::error::comment #$n failed"; fail=1; }
            gh issue edit "$n" \
              --add-label "status:needs-verification" --remove-label "status:in-review" \
              || { echo "::error::label #$n failed"; fail=1; }
          done
          [ "$fail" -eq 0 ] || { echo "One or more issue updates failed."; exit 1; }

  # ── Release tag (or manual dispatch) → released + close ─────────────────────
  released:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Close referenced issues for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -uo pipefail
          TAG="${DISPATCH_TAG:-$GITHUB_REF_NAME}"
          echo "Release tag: $TAG"
          # Previous v* tag in version order, for the commit range.
          PREV=$(git tag --list 'v*' --sort=-version:refname | grep -x -A1 "$TAG" | tail -n1 || true)
          if [ -n "$PREV" ] && [ "$PREV" != "$TAG" ]; then
            echo "Commit range: $PREV..$TAG"
            LOG=$(git log "$PREV..$TAG" --pretty=%B || true)
          else
            echo "No previous tag — scanning all commits reachable from $TAG"
            LOG=$(git log "$TAG" --pretty=%B || true)
          fi
          refs=$(printf '%s' "$LOG" \
            | grep -oiE "$REF_GREP" \
            | grep -oE '[0-9]+' | sort -un || true)
          if [ -z "$refs" ]; then echo "No release-issue refs in range."; exit 0; fi
          fail=0
          for n in $refs; do
            # Idempotent: skip issues already closed (so a re-run / dispatch is
            # safe and doesn't post duplicate "Released" comments).
            state=$(gh issue view "$n" --json state --jq .state 2>/dev/null || echo ERR)
            if [ "$state" = "ERR" ]; then
              echo "::error::Cannot read issue #$n."
              fail=1; continue
            fi
            if [ "$state" = "CLOSED" ]; then echo "#$n already closed — skip"; continue; fi
            echo "→ #$n: released + close"
            gh issue comment "$n" \
              --body "🚀 Released in **${TAG}** — download: https://www.testnizer.com/download/ · Closing; please reopen if it regresses." \
              || { echo "::error::comment #$n failed"; fail=1; }
            gh issue edit "$n" \
              --add-label "status:released" \
              --remove-label "status:needs-verification" --remove-label "status:in-review" \
              || { echo "::error::label #$n failed"; fail=1; }
            gh issue close "$n" --reason completed \
              || { echo "::error::close #$n failed"; fail=1; }
          done
          # Fail the job loudly if any write failed instead of a silent no-op.
          [ "$fail" -eq 0 ] || { echo "One or more issue updates failed."; exit 1; }
