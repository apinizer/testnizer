<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <!--
    Apinizer brand mark — two triangles forming a stylized "A" / forward arrow.
    Blue (#4472C4) left triangle + Orange (#ED7D31) right triangle.
    Transparent background.
  -->

  <!-- Blue triangle — large, left-leaning, the dominant left stroke of the "A" -->
  <polygon
    points="190,830 440,140 560,830"
    fill="#4472C4"
  />

  <!-- Orange triangle — smaller, right-side, overlapping the blue slightly -->
  <polygon
    points="480,830 670,310 834,830"
    fill="#ED7D31"
  />
</svg>
