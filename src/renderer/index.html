<!doctype html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy for the renderer. This is a desktop app that
      must never connect to the open internet from the renderer process —
      all network traffic flows through the main process via IPC. We therefore
      forbid `connect-src` to anywhere. Monaco Editor needs `blob:` workers
      and inline styles, and the app uses inline styles via Tailwind and
      Zustand hydration, so `'unsafe-inline'` is kept for styles only.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" />
    <title>Apinizer API Tester</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
